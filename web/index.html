<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM GUI</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Injection obligatoire pour faire le pont avec Python -->
    <script type="text/javascript" src="/eel.js"></script>
    
    <!-- Include Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="close-sidebar-btn" class="icon-btn" title="Fermer le menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            
            <button id="new-chat-btn" class="nav-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Nouveau chat
            </button>

            <div class="history-section">
                <h3 class="history-title">Historique</h3>
                <div class="history-list" id="history-list">
                    <!-- Les discussions seront injectées ici -->
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Bouton flottant pour ré-ouvrir le menu -->
            <button id="open-sidebar-btn" class="icon-btn floating-btn" title="Ouvrir le menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <!-- État vide (Logo central) -->
            <div id="empty-state" class="empty-state">
                <div class="logo-container">
                    <canvas id="sphere-canvas"></canvas>
                </div>
                <p>Commencez une nouvelle discussion</p>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will appear here -->
            </div>

            <!-- Barre d'input en bas -->
            <div class="chat-input-area">
                <div id="attachments-preview" class="attachments-preview"></div>
                <div class="input-wrapper">
                    <!-- Fichier caché -->
                    <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" style="display: none;" multiple>
                    <!-- Bouton Ajouter (plus) -->
                    <button id="add-file-btn" class="circle-btn" title="Ajouter une image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    
                    <textarea id="message-input" rows="1" placeholder="Envoyer un message"></textarea>
                    
                    <!-- Container pour Select Model et Send Button -->
                    <div class="input-actions">
                        <!-- Menu déroulant personnalisé -->
                        <div class="custom-dropdown" id="model-dropdown">
                            <div class="dropdown-selected" id="dropdown-selected">Chargement...</div>
                            <div class="dropdown-options" id="dropdown-options"></div>
                        </div>
                        
                        <button id="send-btn" class="send-btn circle-btn filled-btn" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    Les LLMs peuvent faire des erreurs.
                </div>
            </div>
        </main>
    </div>
    <!-- Modal de confirmation de suppression -->
    <div id="delete-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Supprimer la discussion</h3>
            <p>Êtes-vous sûr de vouloir supprimer cette discussion ? Cette action est irréversible.</p>
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="modal-btn cancel-btn">Annuler</button>
                <button id="confirm-delete-btn" class="modal-btn delete-btn">Supprimer</button>
            </div>
        </div>
    </div>
    <!-- Scripts JS Séparés -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sphere.js"></script>
</body>
</html>
