<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM GUI</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Injection obligatoire pour faire le pont avec Python -->
    <script type="text/javascript" src="/eel.js"></script>
    
    <!-- Include Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="close-sidebar-btn" class="icon-btn" title="Fermer le menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            
            <button id="new-chat-btn" class="nav-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Nouveau chat
            </button>

            <div class="history-section">
                <h3 class="history-title">Aujourd'hui</h3>
                <div class="history-list">
                    <div class="history-item">Discussions enregistrées (À venir)</div>
                    <!-- Liste des historiques simulée -->
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Bouton flottant pour ré-ouvrir le menu -->
            <button id="open-sidebar-btn" class="icon-btn floating-btn" title="Ouvrir le menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <!-- État vide (Logo central) -->
            <div id="empty-state" class="empty-state">
                <div class="logo-container">
                    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="ollama-logo-svg">
                        <!-- Simplified llama drawing -->
                        <path d="M 35,40 C 35,20 40,10 50,10 C 60,10 65,20 65,40 C 65,55 75,60 80,75 C 80,85 75,90 50,90 C 25,90 20,85 20,75 C 25,60 35,55 35,40 Z"/>
                        <circle cx="43" cy="35" r="3" fill="currentColor"/>
                        <circle cx="57" cy="35" r="3" fill="currentColor"/>
                        <path d="M 47,45 Q 50,48 53,45" stroke="currentColor" fill="none"/>
                        <!-- ears -->
                        <path d="M 35,20 L 30,5 L 45,15" stroke="currentColor" fill="none"/>
                        <path d="M 65,20 L 70,5 L 55,15" stroke="currentColor" fill="none"/>
                    </svg>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will appear here -->
            </div>

            <!-- Barre d'input en bas -->
            <div class="chat-input-area">
                <div id="attachments-preview" class="attachments-preview"></div>
                <div class="input-wrapper">
                    <!-- Fichier caché -->
                    <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" style="display: none;" multiple>
                    <!-- Bouton Ajouter (plus) -->
                    <button id="add-file-btn" class="circle-btn" title="Ajouter une image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    
                    <textarea id="message-input" rows="1" placeholder="Envoyer un message"></textarea>
                    
                    <!-- Container pour Select Model et Send Button -->
                    <div class="input-actions">
                        <select id="model-select" class="model-select">
                            <option value="">Chargement...</option>
                        </select>
                        
                        <button id="send-btn" class="send-btn circle-btn filled-btn" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    Les LLMs peuvent faire des erreurs. Vérifiez toujours les réponses critiques.
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
